# HTTPRoutes for all services
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: identity-route
  namespace: bingeo-app
spec:
  parentRefs:
    - name: bingeo-gateway
      namespace: bingeo-envoy-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/identity
      backendRefs:
        - name: identity-service
          port: 3001
---
apiVersion: gateway.networking.k8s.io/v1
