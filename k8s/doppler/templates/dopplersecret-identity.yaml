# DopplerSecret for Identity Service
# This resource syncs secrets from Doppler to Kubernetes
#
# Prerequisites:
# 1. Doppler Operator installed: make setup
# 2. Doppler token secret created: make doppler-setup
#
# Usage:
#   kubectl apply -f k8s/doppler/templates/dopplersecret-identity.yaml
#
# The operator will create a Kubernetes secret named "identity-service-secrets"
# in the bingeo-app namespace with all secrets from your Doppler project.

apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: identity-service-doppler-secret
  namespace: doppler-operator-system
spec:
  # Reference to the Doppler token secret (created via make doppler-setup)
  tokenSecret:
    name: doppler-token-secret
  
  # Doppler project name (change to match your Doppler project)
  project: bingeo-identity
  
  # Doppler config (dev, stg, prd)
  config: dev
  
  # The Kubernetes secret that will be created/managed
  managedSecret:
    name: identity-service-secrets
    namespace: bingeo-app
    # Optional: Add labels to the managed secret
    # labels:
    #   app: identity-service
    #   managed-by: doppler
